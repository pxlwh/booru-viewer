name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: |
          pip install httpx[http2] Pillow pytest
          pip install -e . --no-deps
      - name: Run tests
        run: pytest tests/ -v
